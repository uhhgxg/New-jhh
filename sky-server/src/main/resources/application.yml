# ============================================
# Sky外卖系统 - 主配置文件
# ============================================

# 服务器配置
server:
  port: 8087  # 应用服务端口号

# Spring框架配置
spring:
  profiles:
    active: dev  # 激活的环境配置（dev-开发环境，prod-生产环境）

  # 数据源配置（使用Druid连接池）
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}  # MySQL驱动类名
      # 数据库连接URL，包含时区、编码、SSL等配置
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}  # 数据库用户名
      password: ${sky.datasource.password}  # 数据库密码

  # Redis缓存配置
  data:
    redis:
      host: ${spring.data.redis.host}  # Redis服务器地址
      port: ${spring.data.redis.port}  # Redis服务器端口
      password: ${spring.data.redis.password}  # Redis访问密码
      database: ${spring.data.redis.database}  # Redis数据库索引（默认0）
      timeout: ${spring.data.redis.timeout}  # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: ${spring.data.redis.lettuce.pool.max-active}  # 连接池最大连接数
          max-wait: ${spring.data.redis.lettuce.pool.max-wait}  # 连接池最大阻塞等待时间
          max-idle: ${spring.data.redis.lettuce.pool.max-idle}  # 连接池中的最大空闲连接数
          min-idle: ${spring.data.redis.lettuce.pool.min-idle}  # 连接池中的最小空闲连接数

  # Spring AI 配置（阿里云百炼 DashScope，OpenAI 兼容协议）
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        # 由 AiConfig 手动创建 EmbeddingModel，禁用自动配置
        enabled: false

  # Redis 向量库 — 由 AiConfig 手动创建 RedisVectorStore Bean
  # 相关配置项在 sky.ai.vector-* 前缀下（见 application-{profile}.yml）

# MyBatis配置
mybatis:
  # Mapper XML文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类扫描包路径
  type-aliases-package: com.sky.entity
  configuration:
    # 开启驼峰命名自动映射（如：user_name -> userName）
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    com:
      sky:
        mapper: debug   # Mapper层日志级别为debug，便于查看SQL语句
        service: info   # Service层日志级别为info
        controller: info  # Controller层日志级别为info

# Sky自定义配置
sky:
  # JWT令牌配置
  jwt:
    # 管理端JWT签名密钥
    admin-secret-key: itcast
    # 管理端JWT过期时间（7200000毫秒 = 2小时）
    admin-ttl: 7200000
    # 管理端前端传递的令牌名称
    admin-token-name: token

    # 用户端JWT签名密钥
    user-secret-key: itcast
    # 用户端JWT过期时间（7200000毫秒 = 2小时）
    user-ttl: 7200000
    # 用户端前端传递的令牌名称
    user-token-name: authentication

  # 阿里云OSS对象存储配置
  alioss:
    access-key-id: ${sky.alioss.access-key-id}  # AccessKey ID
    access-key-secret: ${sky.alioss.access-key-secret}  # AccessKey Secret
    endpoint: ${sky.alioss.access-endpoint}  # OSS访问端点
    bucket-name: ${sky.alioss.bucket-name}  # Bucket名称

  # 微信小程序配置
  wechat:
    app-id: ${sky.wechat.app-id}  # 小程序AppID
    secret: ${sky.wechat.secret}  # 小程序AppSecret

  # 百度地图配置
  baidu:
    ak: ${sky.shop.baidu-ak}

  # 店铺配置
  shop:
    address: 北京市海淀区上地十街10号
    baidu-ak: ${sky.shop.baidu-ak}
    delivery-range: 100
